<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QWIZERO.PRODUCTION | ULTIMATE GENERATION SYSTEM</title>

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #00a2ff;
            --accent-glow: rgba(0, 162, 255, 0.6);
            --bg-dark: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --success: #34c759;
            --error: #ff3b30;
        }

        /* --- НЕОНОВЫЙ СКРОЛЛБАР --- */
        ::-webkit-scrollbar { width: 10px; background-color: var(--bg-dark); }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            border: 2px solid var(--bg-dark);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background: radial-gradient(circle at 50% -20%, #1a1a2e 0%, var(--bg-dark) 80%);
            color: var(--text-main);
            font-family: 'Montserrat', 'Noto Sans JP', sans-serif;
            margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; padding-bottom: 150px;
        }

        #sakura-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .petal { position: absolute; background: #ffb7c5; border-radius: 150% 0 150% 0; opacity: 0.5; animation: fall linear forwards; box-shadow: 0 0 10px rgba(255, 183, 197, 0.4); }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg) translateX(0); }
            100% { transform: translateY(110vh) rotate(720deg) translateX(200px); }
        }

        .top-nav {
            position: fixed; top: 0; left: 0; width: 100%; height: 100px;
            display: flex; justify-content: flex-end; align-items: center;
            padding: 0 50px; z-index: 1000; pointer-events: none;
        }
        .lang-group {
            display: flex; gap: 12px; pointer-events: auto;
            background: rgba(0,0,0,0.3); padding: 8px; border-radius: 20px;
            backdrop-filter: blur(20px); border: 1px solid var(--border);
        }
        .lang-btn {
            background: transparent; border: none; color: var(--text-dim);
            padding: 12px 24px; border-radius: 14px; cursor: pointer;
            font-weight: 800; font-size: 0.8rem; transition: all 0.4s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .lang-btn.active { background: var(--accent); color: white; box-shadow: 0 10px 25px var(--accent-glow); }

       /* --- ОСНОВНОЙ КОНТЕЙНЕР (ПК) --- */
        .content-wrapper { 
            position: relative; 
            z-index: 10; 
            width: 90%; 
            max-width: 1100px; /* Ограничиваем ширину на ПК, чтобы не расползалось */
            margin: 140px auto 0 auto; 
            box-sizing: border-box; 
        }

        .main-card {
            background: var(--card-bg); 
            backdrop-filter: blur(60px); 
            border: 1px solid var(--border);
            border-radius: 60px; 
            padding: 60px; /* Возвращаем жирные отступы для ПК */
            box-shadow: 0 80px 180px rgba(0,0,0,0.8);
        }

        .config-grid {
            display: grid; 
            /* На ПК будет 2 колонки, на телефоне — 1 */
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
            gap: 35px;
            background: rgba(0,0,0,0.5); 
            padding: 45px; 
            border-radius: 45px; 
            margin-top: 40px;
        }

        /* --- ВЫВОД АРТА (ВАЖНО) --- */
        .canvas-area { 
            font-family: "Courier New", monospace; 
            font-size: 11px; /* Стандарт для ПК */
            line-height: 11px; 
            padding: 40px; 
            white-space: pre; 
            display: inline-block; 
            color: #fff; 
        }

       /* --- 1. БАЗОВЫЕ НАСТРОЙКИ (ДЛЯ ПК) --- */
        :root {
            --accent: #00a2ff;
            --accent-glow: rgba(0, 162, 255, 0.6);
            --bg-dark: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --success: #34c759;
            --error: #ff3b30;
        }

        body {
            background: radial-gradient(circle at 50% -20%, #1a1a2e 0%, var(--bg-dark) 80%);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding-bottom: 100px;
        }

        /* Возвращаем жесткую ширину для ПК, чтобы сайт не «плыл» */
        .content-wrapper { 
            position: relative; 
            z-index: 10; 
            width: 1000px; /* Фиксируем ширину для ПК */
            margin-top: 140px; 
        }

        .main-card {
            background: var(--card-bg); 
            backdrop-filter: blur(60px); 
            border: 1px solid var(--border);
            border-radius: 60px; 
            padding: 60px;
            box-shadow: 0 80px 180px rgba(0,0,0,0.8);
        }

        /* Возвращаем сетку в 2 колонки для ПК */
        .config-grid {
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 35px;
            background: rgba(0,0,0,0.5); 
            padding: 45px; 
            border-radius: 45px; 
            margin-top: 40px;
        }

        .canvas-area { 
            font-family: "Courier New", monospace; 
            font-size: 11px; 
            line-height: 11px; 
            padding: 40px; 
            white-space: pre; 
            display: inline-block; 
            color: #fff; 
        }

        .output-wrapper { 
            background: #000; 
            border-radius: 40px; 
            margin: 40px 0; 
            height: 550px; 
            overflow: auto; 
            border: 1px solid var(--border); 
        }

        /* --- 2. НАСТРОЙКИ ТОЛЬКО ДЛЯ ТЕЛЕФОНОВ (MOBILE) --- */
        @media (max-width: 1024px) {
            .content-wrapper { 
                width: 95%; /* На мобилках переходим на проценты */
                margin-top: 100px;
            }

            .main-card { 
                padding: 30px 20px; 
                border-radius: 30px; 
            }

            .config-grid { 
                grid-template-columns: 1fr; /* На мобилке — в один столбец */
                padding: 25px;
                gap: 20px;
            }

            .canvas-area { 
                font-size: 6px; /* Уменьшаем арт только на маленьких экранах */
                line-height: 6px; 
                padding: 15px; 
            }

            h1#header { 
                font-size: 1.2rem; 
                letter-spacing: 4px; 
            }
            
            .top-nav { padding: 0 20px; }
        }
    </style>
</head>
<body>

    <div id="sakura-container"></div>

    <nav class="top-nav">
        <div class="lang-group">
            <button id="btn-en" class="lang-btn active" onclick="setLanguage('en')">English</button>
            <button id="btn-ru" class="lang-btn" onclick="setLanguage('ru')">Русский</button>
            <button id="btn-jp" class="lang-btn" onclick="setLanguage('jp')">日本語</button>
        </div>
    </nav>

    <div class="modal" id="guide-modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <h2 id="modal-title" style="font-size: 2rem; margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; color: #fff;"></h2>
            <div id="modal-body"></div>
        </div>
    </div>

    <div class="content-wrapper">
        <div class="header-box">
            <h1 id="header"></h1>
        </div>

        <div class="main-card">
            <label for="file-upload" class="upload-label" id="ui-upload-btn"></label>
            <input type="file" id="file-upload" accept="image/*" style="display:none">

            <div class="config-grid">
                <div class="control-unit">
                    <label id="ui-label-width">Matrix Width <span id="val-w">60</span></label>
                    <input type="range" id="range-w" min="20" max="150" value="60" oninput="updateVal('val-w', this.value)">
                </div>
                <div class="control-unit">
                    <label id="ui-label-aspect">Vertical Ratio <span id="val-a">0.50</span></label>
                    <input type="range" id="range-a" min="0.10" max="1.50" step="0.01" value="0.50" oninput="updateVal('val-a', this.value)">
                </div>
                <div class="control-unit">
                    <label id="ui-label-bright">Luminance <span id="val-b">1.10</span></label>
                    <input type="range" id="range-b" min="0.5" max="2.0" step="0.05" value="1.10" oninput="updateVal('val-b', this.value)">
                </div>
                <div class="control-unit">
                    <label id="ui-label-contrast">Contrast Depth <span id="val-c">1.50</span></label>
                    <input type="range" id="range-c" min="0.5" max="3.0" step="0.05" value="1.50" oninput="updateVal('val-c', this.value)">
                </div>
                <div class="full-width">
                    <div class="toggle-box">
                        <label id="ui-label-invert" style="font-weight: 800; font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase;"></label>
                        <input type="checkbox" id="check-i" style="width: 24px; height: 24px; cursor: pointer; accent-color: var(--accent);">
                    </div>
                </div>
                <button class="primary-btn full-width" onclick="executeGeneration()" id="ui-gen-btn"></button>
            </div>

            <div class="output-wrapper">
                <pre class="canvas-area" id="output-canvas"></pre>
            </div>

            <div class="info-bar">
                <div><span id="ui-stat-label"></span>: <span id="char-count">0</span> / 1000</div>
                <div id="ui-warn" class="warn-text"></div>
            </div>

            <button class="secondary-btn" onclick="copyToClipboard()" id="ui-copy-btn"></button>
        </div>
    </div>

    <div class="fab-container">
        <button class="fab fab-blue" onclick="openModal()" id="ui-fab-guide"></button>
        <a href="https://t.me/qwizero_production" target="_blank" class="fab">Telegram</a>
    </div>

    <script>
        const DB = {
            en: {
                welcome: ["QWIZERO.PRODUCTION", "Premium Braille Generation", "Advanced Visual Engine"],
                ui: {
                    upload: "Initialize Source Image", width: "Matrix Width", aspect: "Vertical Ratio",
                    bright: "Luminance", contrast: "Contrast Depth", invert: "Invert Output Matrix",
                    generate: "Generate Premium Art", copy: "Copy to System Clipboard",
                    copied: "Data Secured in Clipboard!", guide: "Documentation",
                    stat: "Characters", warn: "CRITICAL: LIMIT EXCEEDED", mTitle: "System Documentation"
                },
                guide: `
                    <div class="guide-section">
                        <h3>1. Dimensional Control</h3>
                        <p>The <b>Matrix Width</b> determines the horizontal resolution. For most web profiles (like Steam Info Boxes), <b>60</b> is the optimal standard. Higher values require wider display containers.</p>
                    </div>
                    <div class="guide-section">
                        <h3>2. Geometric Correction</h3>
                        <p>Braille symbols are naturally taller than they are wide. If your generation looks "stretched", reduce the <b>Vertical Ratio</b> to approximately <b>0.45 - 0.50</b> to restore original proportions.</p>
                    </div>
                    <div class="guide-section">
                        <h3>3. Optical Processing</h3>
                        <p><b>Luminance</b> and <b>Contrast</b> are crucial for edge definition. High-contrast images with clear silhouettes produce the most sophisticated Braille patterns.</p>
                    </div>
                    <div class="guide-section">
                        <h3>4. Buffer Constraints</h3>
                        <p>Most platforms enforce a <b>1000 character limit</b>. Our system tracks this in real-time. If the limit is exceeded, reduce the Width or crop the source image.</p>
                    </div>
                `
            },
            ru: {
                welcome: ["QWIZERO.PRODUCTION", "Премиальная Генерация Брайля", "Передовая Арт-Система"],
                ui: {
                    upload: "Инициализировать Изображение", width: "Ширина Матрицы", aspect: "Вертикальный Масштаб",
                    bright: "Яркость", contrast: "Глубина Контраста", invert: "Инверсия Матрицы",
                    generate: "Создать Премиальный Арт", copy: "Копировать в Буфер Обмена",
                    copied: "Данные успешно скопированы!", guide: "Документация",
                    stat: "Символов", warn: "КРИТИЧЕСКИЙ ЛИМИТ ПРЕВЫШЕН", mTitle: "Техническое Руководство"
                },
                guide: `
                    <div class="guide-section">
                        <h3>1. Контроль Размеров</h3>
                        <p><b>Ширина матрицы</b> определяет горизонтальное разрешение. Для стандартных блоков "О себе" идеальное значение — <b>60</b>. Более высокие значения могут привести к разрыву строк на узких экранах.</p>
                    </div>
                    <div class="guide-section">
                        <h3>2. Коррекция Пропорций</h3>
                        <p>Символы Брайля имеют вертикальную ориентацию. Если результат кажется вытянутым, уменьшите <b>Вертикальный масштаб</b> до <b>0.45 - 0.50</b>. Это вернет изображению правильную геометрию.</p>
                    </div>
                    <div class="guide-section">
                        <h3>3. Оптическая Обработка</h3>
                        <p><b>Яркость</b> и <b>Контраст</b> напрямую влияют на детализацию. Рекомендуется использовать изображения с четкими контурами. Высокий контраст позволяет системе лучше выделять мелкие детали.</p>
                    </div>
                    <div class="guide-section">
                        <h3>4. Лимиты Данных</h3>
                        <p>Большинство систем ограничивают текстовые поля <b>1000 символами</b>. Наш индикатор подсветит ошибку, если объем данных превысит допустимый порог. В этом случае просто уменьшите ширину рендеринга.</p>
                    </div>
                `
            },
            jp: {
                welcome: ["ようこそ QWIZERO.PRODUCTION", "プレミアム点字生成", "高度な視覚エンジン"],
                ui: {
                    upload: "ソース画像を読み込む", width: "レンダリング幅", aspect: "垂直アスペクト比",
                    bright: "輝度調整", contrast: "コントラスト深度", invert: "マтриックス反転",
                    generate: "プレミアムアートを生成", copy: "クリップボードにコピー",
                    copied: "コピー完了！", guide: "ドキュメント",
                    stat: "文字数", warn: "警告：制限を超えています", mTitle: "システムドキュメント"
                },
                guide: `<div class="guide-section"><h3>1. 次元の制御</h3><p>レンダリング幅は、水平方向の解像度を決定します。</p></div>`
            }
        };

        let currentLang = 'en', typeIdx = 0, charIdx = 0, isDeleting = false, tTimeout;

        function setLanguage(lang) {
            clearTimeout(tTimeout);
            document.getElementById('header').textContent = "";
            charIdx = 0; typeIdx = 0; isDeleting = false;
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${lang}`).classList.add('active');
            const data = DB[lang];
            document.getElementById('ui-upload-btn').innerText = data.ui.upload;
            document.getElementById('ui-label-width').firstChild.textContent = data.ui.width;
            document.getElementById('ui-label-aspect').firstChild.textContent = data.ui.aspect;
            document.getElementById('ui-label-bright').firstChild.textContent = data.ui.bright;
            document.getElementById('ui-label-contrast').firstChild.textContent = data.ui.contrast;
            document.getElementById('ui-label-invert').innerText = data.ui.invert;
            document.getElementById('ui-gen-btn').innerText = data.ui.generate;
            document.getElementById('ui-copy-btn').innerText = data.ui.copy;
            document.getElementById('ui-fab-guide').innerText = data.ui.guide;
            document.getElementById('ui-stat-label').innerText = data.ui.stat;
            document.getElementById('ui-warn').innerText = data.ui.warn;
            document.getElementById('modal-title').innerText = data.ui.mTitle;
            document.getElementById('modal-body').innerHTML = data.guide;
            typeCycle();
        }

        function typeCycle() {
            const list = DB[currentLang].welcome, text = list[typeIdx], el = document.getElementById('header');
            el.textContent = isDeleting ? text.substring(0, charIdx--) : text.substring(0, charIdx++);
            let speed = isDeleting ? 40 : 100;
            if (!isDeleting && charIdx > text.length) { isDeleting = true; speed = 3000; }
            else if (isDeleting && charIdx < 0) { isDeleting = false; typeIdx = (typeIdx + 1) % list.length; speed = 500; }
            tTimeout = setTimeout(typeCycle, speed);
        }

        function updateVal(id, val) { document.getElementById(id).innerText = parseFloat(val).toFixed(2); }
        function openModal() { document.getElementById('guide-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('guide-modal').style.display = 'none'; }

        async function executeGeneration() {
            const file = document.getElementById('file-upload').files[0];
            if (!file) return;
            const fd = new FormData();
            fd.append('photo', file);
            fd.append('width', document.getElementById('range-w').value);
            fd.append('aspect', document.getElementById('range-a').value);
            fd.append('brightness', document.getElementById('range-b').value);
            fd.append('contrast', document.getElementById('range-c').value);
            if(document.getElementById('check-i').checked) fd.append('invert', 'on');

            const res = await fetch('/', { method: 'POST', body: fd });
            const art = await res.text();
            document.getElementById('output-canvas').innerText = art;
            const len = art.length;
            document.getElementById('char-count').innerText = len;
            document.getElementById('ui-warn').style.display = len > 1000 ? 'block' : 'none';
            document.getElementById('char-count').style.color = len > 1000 ? 'var(--error)' : 'var(--success)';
        }

        function copyToClipboard() {
            const text = document.getElementById('output-canvas').innerText;
            if(!text) return;
            navigator.clipboard.writeText(text);
            const btn = document.getElementById('ui-copy-btn');
            btn.innerText = DB[currentLang].ui.copied;
            btn.style.background = 'var(--accent)';
            setTimeout(() => {
                btn.innerText = DB[currentLang].ui.copy;
                btn.style.background = 'rgba(255,255,255,0.06)';
            }, 2000);
        }

        setInterval(() => {
            const p = document.createElement('div'); p.className = 'petal';
            p.style.left = Math.random() * 100 + 'vw';
            const size = Math.random() * 8 + 4 + 'px';
            p.style.width = size; p.style.height = size;
            p.style.animationDuration = Math.random() * 5 + 6 + 's';
            document.getElementById('sakura-container').appendChild(p);
            setTimeout(() => p.remove(), 9000);
        }, 250);

        setLanguage('en');
    </script>
</body>

</html>
